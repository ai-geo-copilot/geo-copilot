      <h1>如何设置 GEO 检查流程</h1>
      <h2>这是什么</h2>
      <p>
        GEO 检查流程是一种用于确认页面是否具备抓取、吸收、证据追踪与安全边界的标准化文档步骤。
      </p>
      <h2>步骤</h2>
      <ol>
        <li>步骤 1：先确认标题、canonical、语言和主 H1 是否完整。</li>
        <li>步骤 2：再补齐定义段、来源提示和关键统计口径。</li>
        <li>步骤 3：最后保存快照并检查 evidence_ref 是否稳定。</li>
      </ol>
      <p>
        按照 2026 年 5 月实施手册，团队通常可在 3 步内完成首轮 GEO 页面校验。
      </p>
      <p>
        来源：2026 年 5 月实施手册与内部交付复盘，记录了字段冻结与规则回归的标准做法。
      </p>
    </main>
